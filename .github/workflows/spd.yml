name: "dependency tester"

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      tokenOne:
        description: "Token One"
        required: true
        type: string

      tokenTwo:
        description: "Token Two"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test-spd:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create token file
        shell: pwsh
        run: |
          @"
          ${{ github.event.inputs.tokenOne }}
          ${{ github.event.inputs.tokenTwo }}
          ${{ github.event.inputs.tokenOne }}
          ${{ github.event.inputs.tokenTwo }}
          "@ | Out-File token.txt

          Write-Host "this is the token:"
          Get-Content token.txt

      - name: test deps
        shell: bash
        run: |
          chmod +x ./test.sh
          bash ./test.sh