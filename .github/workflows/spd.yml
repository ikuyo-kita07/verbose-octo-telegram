name: "Tsukika's Dependencies Updater"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      updateSystemBinaries:
        description: "Do you want to Update dependencies?"
        required: true
        default: "Update"
        type: choice
        options:
          - Update
          - Skip

permissions:
  contents: write

jobs:
  test-spd◘:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: eehehehehehh
        run: |
        if: ${{ github.event.inputs.updateSystemBinaries == 'Update' }}
          sudo apt update -y && sudo apt upgrade -y
          sudo apt install aria2 curl -y

      - name: testtstetetetete
        if: ${{ github.event.inputs.update_dependencies == 'Update' }}
        run: |
          chmod +x ./test.sh
          bash ./test.sh